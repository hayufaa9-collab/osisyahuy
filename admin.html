<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Pendaftaran OSIS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    header {
      background: #1a237e; color: #fff;
      padding: 16px 30px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; }
    .container { padding: 30px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 20px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card .num { font-size: 32px; font-weight: 700; color: #1a237e; }
    .stat-card .lbl { font-size: 12px; color: #888; margin-top: 4px; }
    .table-wrap {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #eee; gap: 10px; flex-wrap: wrap;
    }
    .table-header h2 { font-size: 15px; color: #333; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .table-header input {
      padding: 7px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 13px; outline: none; width: 200px;
    }
    .table-header input:focus { border-color: #1a237e; }
    .btn-export {
      padding: 8px 16px; background: #2e7d32; color: #fff;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-export:hover { background: #1b5e20; }
    .btn-refresh {
      padding: 8px 16px; background: #1565c0; color: #fff;
      border: none; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-refresh:hover { background: #0d47a1; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: #f5f6fa; }
    th { padding: 12px 16px; text-align: left; color: #555; font-weight: 600; }
    td { padding: 12px 16px; border-top: 1px solid #f0f0f0; color: #333; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-l { background: #e3f2fd; color: #1565c0; }
    .badge-p { background: #fce4ec; color: #c62828; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <h1>🏫 Panel Admin OSIS</h1>
    <span id="tglHari"></span>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="totalPendaftar">0</div>
        <div class="lbl">Total Pendaftar</div>
      </div>
      <div class="stat-card">
        <div class="num" id="totalL">0</div>
        <div class="lbl">Laki-laki</div>
      </div>
      <div class="stat-card">
        <div class="num" id="totalP">0</div>
        <div class="lbl">Perempuan</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>Data Pendaftar</h2>
        <div class="controls">
          <input type="text" id="search" placeholder="🔍 Cari nama..." oninput="filterData()" />
          <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
          <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nama</th>
            <th>Kejuruan</th>
            <th>Kelas</th>
            <th>Jenis Kelamin</th>
            <th>No. HP</th>
            <th>Bidang</th>
            <th>Motivasi</th>
            <th>Tanggal Daftar</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="9" class="empty">⏳ Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxm1YbjdMEC9HpCQNIM_bpCFT8PYanazi_FNLA8z3bOke8lfNRyVVYvVwlc5jKEvuyk/exec';
    let allData = [];

    document.getElementById('tglHari').textContent = new Date().toLocaleDateString('id-ID', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    async function loadData() {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty">⏳ Memuat data...</td></tr>';
      try {
        // Pakai no-cors tidak bisa baca response, pakai proxy CORS publik
        const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(APPS_SCRIPT_URL));
        allData = await res.json();
        renderTable(allData);
        updateStats(allData);
      } catch (err) {
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="9" class="empty">❌ Gagal memuat data. Klik 🔄 Refresh untuk coba lagi.</td></tr>';
      }
    }

    function updateStats(data) {
      document.getElementById('totalPendaftar').textContent = data.length;
      document.getElementById('totalL').textContent = data.filter(d => d['Jenis Kelamin'] === 'Laki-laki').length;
      document.getElementById('totalP').textContent = data.filter(d => d['Jenis Kelamin'] === 'Perempuan').length;
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">Belum ada pendaftar.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map((d, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${d['Nama'] || ''}</td>
          <td>${d['Kejuruan'] || ''}</td>
          <td>${d['Kelas'] || ''}</td>
          <td><span class="badge ${d['Jenis Kelamin'] === 'Laki-laki' ? 'badge-l' : 'badge-p'}">${d['Jenis Kelamin'] || ''}</span></td>
          <td>${d['No. HP'] || ''}</td>
          <td>${d['Bidang'] || ''}</td>
          <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${d['Motivasi'] || ''}">${d['Motivasi'] || ''}</td>
          <td>${d['Tanggal'] || ''}</td>
        </tr>
      `).join('');
    }

    function filterData() {
      const q = document.getElementById('search').value.toLowerCase();
      renderTable(allData.filter(d => (d['Nama'] || '').toLowerCase().includes(q)));
    }

    function exportExcel() {
      if (allData.length === 0) { alert('Belum ada data untuk diekspor.'); return; }
      const header = ['No', 'Nama', 'Kejuruan', 'Kelas', 'Jenis Kelamin', 'No. HP', 'Bidang', 'Motivasi', 'Tanggal'];
      const rows = allData.map((d, i) => [
        i + 1, d['Nama'], d['Kejuruan'], d['Kelas'], d['Jenis Kelamin'],
        d['No. HP'], d['Bidang'], d['Motivasi'], d['Tanggal']
      ]);
      const csvContent = [header, ...rows]
        .map(row => row.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(','))
        .join('\n');
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pendaftar_osis.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    loadData();
  </script>
</body>
</html>

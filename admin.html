<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Pendaftaran OSIS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    header {
      background: #1a237e; color: #fff;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 6px;
    }
    header h1 { font-size: 16px; }
    header span { font-size: 11px; opacity: 0.8; }
    .container { padding: 16px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .stat-card {
      background: #fff; border-radius: 12px; padding: 14px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card .num { font-size: 26px; font-weight: 700; color: #1a237e; }
    .stat-card .lbl { font-size: 11px; color: #888; margin-top: 4px; }
    .table-wrap {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden;
    }
    .table-header {
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #eee; gap: 8px; flex-wrap: wrap;
    }
    .table-header h2 { font-size: 14px; color: #333; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; width: 100%; }
    .table-header input {
      padding: 7px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 13px; outline: none; flex: 1; min-width: 0;
    }
    .table-header input:focus { border-color: #1a237e; }
    .btn-export {
      padding: 8px 12px; background: #2e7d32; color: #fff;
      border: none; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .btn-refresh {
      padding: 8px 12px; background: #1565c0; color: #fff;
      border: none; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
    }

    /* Desktop: tabel biasa */
    .desktop-table {
      display: block; overflow-x: auto;
      cursor: grab; user-select: none;
    }
    .desktop-table.dragging { cursor: grabbing; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
    thead { background: #f5f6fa; }
    th { padding: 12px 16px; text-align: left; color: #555; font-weight: 600; }
    td { padding: 12px 16px; border-top: 1px solid #f0f0f0; color: #333; }
    tr:hover td { background: #fafafa; }

    /* Mobile: card list */
    .mobile-cards { display: none; padding: 12px; }
    .pendaftar-card {
      background: #f9f9f9; border-radius: 10px;
      padding: 14px; margin-bottom: 10px;
      border-left: 4px solid #1a237e;
    }
    .pendaftar-card .nama { font-weight: 700; font-size: 15px; color: #1a237e; margin-bottom: 6px; }
    .pendaftar-card .row-info { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 3px; }
    .pendaftar-card .motivasi-text { font-size: 12px; color: #777; margin-top: 6px; font-style: italic; }

    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-l { background: #e3f2fd; color: #1565c0; }
    .badge-p { background: #fce4ec; color: #c62828; }
    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    @media (max-width: 640px) {
      .desktop-table { display: none; }
      .mobile-cards { display: block; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏫 ADMIN OSIS SMK AL-HUSAENIYAH</h1>
    <span id="tglHari"></span>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="totalPendaftar">0</div>
        <div class="lbl">Total Pendaftar</div>
      </div>
      <div class="stat-card">
        <div class="num" id="totalL">0</div>
        <div class="lbl">Laki-laki</div>
      </div>
      <div class="stat-card">
        <div class="num" id="totalP">0</div>
        <div class="lbl">Perempuan</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>Data Pendaftar</h2>
        <div class="controls">
          <input type="text" id="search" placeholder="🔍 Cari nama..." oninput="filterData()" />
          <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
          <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
        </div>
      </div>
      <div class="desktop-table">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nama</th>
              <th>Kejuruan</th>
              <th>Kelas</th>
              <th>Jenis Kelamin</th>
              <th>No. HP</th>
              <th>Bidang</th>
              <th>Motivasi</th>
              <th>Tanggal Daftar</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="9" class="empty">⏳ Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="mobile-cards" id="mobileCards">
        <div class="empty">⏳ Memuat data...</div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZYp1WmoR5s3QrMOiCe5T1Kge0rTMvjFimf4WrN2iULnOu3ZFefZhjbRMWSgqemaFz/exec';
    let allData = [];

    document.getElementById('tglHari').textContent = new Date().toLocaleDateString('id-ID', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    async function loadData() {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty">⏳ Memuat data...</td></tr>';

      // Pakai JSONP untuk bypass CORS
      const callbackName = 'osisCallback_' + Date.now();
      const script = document.createElement('script');

      const timeout = setTimeout(() => {
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="9" class="empty">❌ Timeout. Pastikan Apps Script sudah di-deploy dengan benar.</td></tr>';
        delete window[callbackName];
        document.body.removeChild(script);
      }, 10000);

      window[callbackName] = function(data) {
        clearTimeout(timeout);
        delete window[callbackName];
        document.body.removeChild(script);
        allData = Array.isArray(data) ? data : [];
        renderTable(allData);
        updateStats(allData);
      };

      script.src = APPS_SCRIPT_URL + '?callback=' + callbackName;
      script.onerror = function() {
        clearTimeout(timeout);
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="9" class="empty">❌ Gagal memuat. Cek URL Apps Script.</td></tr>';
        delete window[callbackName];
      };
      document.body.appendChild(script);
    }

    function updateStats(data) {
      document.getElementById('totalPendaftar').textContent = data.length;
      document.getElementById('totalL').textContent = data.filter(d => d['Jenis Kelamin'] === 'Laki-laki').length;
      document.getElementById('totalP').textContent = data.filter(d => d['Jenis Kelamin'] === 'Perempuan').length;
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      const mobileCards = document.getElementById('mobileCards');

      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">Belum ada pendaftar.</td></tr>';
        mobileCards.innerHTML = '<div class="empty">Belum ada pendaftar.</div>';
        return;
      }

      // Desktop tabel
      tbody.innerHTML = data.map((d, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${d['Nama'] || ''}</td>
          <td>${d['Kejuruan'] || ''}</td>
          <td>${d['Kelas'] || ''}</td>
          <td><span class="badge ${d['Jenis Kelamin'] === 'Laki-laki' ? 'badge-l' : 'badge-p'}">${d['Jenis Kelamin'] || ''}</span></td>
          <td>${d['No. HP'] || ''}</td>
          <td>${d['Bidang'] || ''}</td>
          <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${d['Motivasi'] || ''}">${d['Motivasi'] || ''}</td>
          <td>${d['Tanggal'] || ''}</td>
        </tr>
      `).join('');

      // Mobile cards
      mobileCards.innerHTML = data.map((d, i) => `
        <div class="pendaftar-card">
          <div class="nama">${i + 1}. ${d['Nama'] || ''}</div>
          <div class="row-info"><span>Kejuruan</span><span>${d['Kejuruan'] || ''}</span></div>
          <div class="row-info"><span>Kelas</span><span>${d['Kelas'] || ''}</span></div>
          <div class="row-info"><span>Jenis Kelamin</span><span><span class="badge ${d['Jenis Kelamin'] === 'Laki-laki' ? 'badge-l' : 'badge-p'}">${d['Jenis Kelamin'] || ''}</span></span></div>
          <div class="row-info"><span>No. HP</span><span>${d['No. HP'] || ''}</span></div>
          <div class="row-info"><span>Bidang</span><span>${d['Bidang'] || ''}</span></div>
          <div class="row-info"><span>Tanggal</span><span>${d['Tanggal'] || ''}</span></div>
          <div class="motivasi-text">"${d['Motivasi'] || ''}"</div>
        </div>
      `).join('');
    }

    function filterData() {
      const q = document.getElementById('search').value.toLowerCase();
      renderTable(allData.filter(d => (d['Nama'] || '').toLowerCase().includes(q)));
    }

    function exportExcel() {
      if (allData.length === 0) { alert('Belum ada data untuk diekspor.'); return; }
      const header = ['No', 'Nama', 'Kejuruan', 'Kelas', 'Jenis Kelamin', 'No. HP', 'Bidang', 'Motivasi', 'Tanggal'];
      const rows = allData.map((d, i) => [
        i + 1, d['Nama'], d['Kejuruan'], d['Kelas'], d['Jenis Kelamin'],
        d['No. HP'], d['Bidang'], d['Motivasi'], d['Tanggal']
      ]);
      const csvContent = [header, ...rows]
        .map(row => row.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(','))
        .join('\n');
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'pendaftar_osis.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    loadData();

    // Drag scroll untuk tabel desktop
    const tableWrap = document.querySelector('.desktop-table');
    let isDown = false, startX, scrollLeft;
    tableWrap.addEventListener('mousedown', e => {
      isDown = true;
      tableWrap.classList.add('dragging');
      startX = e.pageX - tableWrap.offsetLeft;
      scrollLeft = tableWrap.scrollLeft;
    });
    tableWrap.addEventListener('mouseleave', () => { isDown = false; tableWrap.classList.remove('dragging'); });
    tableWrap.addEventListener('mouseup', () => { isDown = false; tableWrap.classList.remove('dragging'); });
    tableWrap.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - tableWrap.offsetLeft;
      tableWrap.scrollLeft = scrollLeft - (x - startX);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pendaftaran OSIS SMK AL HUSAENIYAH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a237e, #283593);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card-header { text-align: center; margin-bottom: 30px; }
    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 4px; margin-bottom: 14px;
    }
    .logo-wrap img {
      height: 80px; width: auto; object-fit: contain;
    }
    .logo-wrap img.logo-mid {
      height: 80px;
    }
    .card-header h1 { font-size: 22px; color: #1a237e; font-weight: 700; }
    .card-header p { color: #666; font-size: 13px; margin-top: 4px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; color: #333;
      transition: border-color 0.2s; outline: none; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: #1a237e; }
    textarea { resize: vertical; min-height: 80px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .radio-group { display: flex; gap: 20px; margin-top: 4px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; font-weight: 400; cursor: pointer; }
    .radio-group input[type="radio"] { width: auto; accent-color: #1a237e; }
    button[type="submit"] {
      width: 100%; padding: 12px; background: #1a237e; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #283593; }
    button[type="submit"]:disabled { background: #9fa8da; cursor: not-allowed; }
    .success-msg {
      display: none; background: #e8f5e9; border: 1px solid #a5d6a7;
      color: #2e7d32; border-radius: 8px; padding: 14px;
      text-align: center; margin-top: 16px; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo-wrap">
        <img src="Logo SMK PNG.png" alt="Logo SMK" />
        <img src="1000296784-removebg-preview.png" alt="Logo OSIS" class="logo-mid" />
        <img src="SMK Bisa Hebat V1.png" alt="SMK Bisa Hebat" />
      </div>
      <h1>PENDAFTARAN</h1>
      <h1>OSIS SMK AL HUSAENIYAH</h1>
      <p style="margin-top:2px;">Isi formulir di bawah ini dengan lengkap dan benar</p>
    </div>

    <form id="osisForm">
      <div class="row">
        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Nama lengkap" required />
        </div>
        <div class="form-group">
          <label for="kejuruan">Kejuruan</label>
          <select id="kejuruan" required>
            <option value="">-- Pilih Kejuruan --</option>
            <option>PPLG</option>
            <option>PBKS</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="kelas">Kelas</label>
          <select id="kelas" required>
            <option value="">-- Pilih Kelas --</option>
            <option>X</option>
            <option>XI</option>
          </select>
        </div>
        <div class="form-group">
          <label>Jenis Kelamin</label>
          <div class="radio-group">
            <label><input type="radio" name="jk" value="L" required /> Laki-laki</label>
            <label><input type="radio" name="jk" value="P" /> Perempuan</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="hp">No. HP / WhatsApp</label>
        <input type="tel" id="hp" placeholder="08xxxxxxxxxx" required />
      </div>

      <div class="form-group">
        <label for="bidang">Bidang yang Diminati</label>
        <select id="bidang" required>
          <option value="">-- Pilih Bidang --</option>
          <option>Sekretaris</option>
          <option>Bendahara</option>
          <option>Bidang Keagamaan</option>
          <option>Bidang Kedisiplinan</option>
          <option>Bidang Akademik</option>
          <option>Bidang Olahraga</option>
          <option>Bidang Teknologi Informasi</option>
          <option>Bidang Humas</option>
           <option>Bidang Kewirausahaan</option>
        </select>
      </div>

      <div class="form-group">
        <label for="motivasi">Motivasi Bergabung</label>
        <textarea id="motivasi" placeholder="Tuliskan motivasi kamu bergabung OSIS..." required></textarea>
      </div>

      <button type="submit">Daftar Sekarang</button>
      <div class="success-msg" id="successMsg">
        <div style="font-size:40px;margin-bottom:10px;">🎉</div>
        <strong style="font-size:16px;">Pendaftaran Berhasil!</strong>
        <p style="margin-top:8px;font-size:13px;line-height:1.6;">
          Selamat! Kamu telah resmi mendaftar sebagai calon anggota OSIS.<br/>
          Tetap semangat dan tunjukkan yang terbaik dari dirimu! 💪<br/><br/>
          <strong>Tunggu info lebih lanjut dari kami ya!</strong>
        </p>
      </div>
    </form>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZYp1WmoR5s3QrMOiCe5T1Kge0rTMvjFimf4WrN2iULnOu3ZFefZhjbRMWSgqemaFz/exec';

    document.getElementById('osisForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const jk = document.querySelector('input[name="jk"]:checked');
      if (!jk) { alert('⚠️ Pilih jenis kelamin terlebih dahulu.'); return; }

      const nama = document.getElementById('nama').value;
      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Mengirim...';

      const payload = {
        nama,
        kejuruan: document.getElementById('kejuruan').value,
        kelas: document.getElementById('kelas').value,
        jenis_kelamin: jk.value === 'L' ? 'Laki-laki' : 'Perempuan',
        no_hp: document.getElementById('hp').value,
        bidang: document.getElementById('bidang').value,
        motivasi: document.getElementById('motivasi').value
      };

      try {
        const formData = new FormData();
        Object.keys(payload).forEach(k => formData.append(k, payload[k]));

        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: formData
        });

        alert(`🎉 Selamat, ${nama}!\n\nPendaftaran OSIS kamu telah berhasil dikirim.\nTetap semangat dan tunjukkan yang terbaik dari dirimu!\n\nKami akan segera menghubungi kamu. 💪`);
        document.querySelector('.card').innerHTML = `
          <div style="text-align:center;padding:20px 0;">
            <div class="logo-wrap">
              <img src="Logo SMK PNG.png" alt="Logo SMK" style="height:80px;width:auto;object-fit:contain;" />
              <img src="1000296784-removebg-preview.png" alt="Logo OSIS" style="height:80px;width:auto;object-fit:contain;" />
              <img src="SMK Bisa Hebat V1.png" alt="SMK Bisa Hebat" style="height:80px;width:auto;object-fit:contain;" />
            </div>
            <div style="font-size:60px;margin:16px 0;">🎉</div>
            <h2 style="color:#1a237e;font-size:22px;font-weight:700;">Pendaftaran Berhasil!</h2>
            <p style="color:#555;font-size:14px;margin-top:12px;line-height:1.8;">
              Selamat <strong>${nama}</strong>!<br/>
              Kamu telah resmi mendaftar sebagai calon anggota OSIS<br/>
              SMK Al Husaeniyah.<br/><br/>
              <strong style="color:#1a237e;">Tunggu info lebih lanjut dari kami ya! 💪</strong>
            </p>
          </div>
        `;
      } catch (err) {
        alert('❌ Gagal mengirim data. Periksa koneksi internet kamu.');
        btn.disabled = false;
        btn.textContent = 'Daftar Sekarang';
      }
    });
  </script>
</body>
</html>
